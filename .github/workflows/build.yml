name: Build C++ CAD Viewer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config Release

    - name: Package Release
      run: |
        mkdir release_package
        copy ${{github.workspace}}\build\Release\*.exe release_package\
        copy ${{github.workspace}}\*.stl release_package\
        copy ${{github.workspace}}\README.md release_package\
        Compress-Archive -Path release_package\* -DestinationPath Huhb-Utopia-CAD-Viewer-Windows.zip

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: Huhb-Utopia-CAD-Viewer-Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Archive production artifacts
      uses: actions/upload-artifact@v3
      with:
        name: Huhb-Utopia-CAD-Viewer
        path: Huhb-Utopia-CAD-Viewer-Windows.zip
